databases:
  - name: garagebot-db
    plan: free
    databaseName: garagebot
    user: garagebot

services:
  - type: web
    name: garagebot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: APP_DOMAIN
        value: garagebot.io
      - key: DATABASE_URL
        fromDatabase:
          name: garagebot-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SOLANA_PRIVATE_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: TRUST_LAYER_SSO_API_KEY
        sync: false
